<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>

    <style>
        body{
            background:#f2f2f2;
            font-family:Georgia, serif;
        }

        h1{
            text-align:center;
        }

        .container{
            width:350px;
            margin:20px auto;
            border:1px solid gray;
            padding:20px;
            background:#fff;
        }

        input, select{
            width:100%;
            margin-bottom:12px;
            padding:5px;
            box-sizing:border-box;
        }

        .skills input,
        .gender input{
            width:auto;
        }
    </style>
</head>
<body>

<h1>Student Registration Form</h1>

<div class="container">

    <label>Username:</label>
    <input type="text">

    <label>Password:</label>
    <input type="password">

    <label>Email:</label>
    <input type="email">

    <label>Phone Number:</label>
    <input type="tel">

    <label>Website URL:</label>
    <input type="url">

    <label>Age:</label>
    <input type="number">

    <label>Date of Birth:</label>
    <input type="date">

    <label>Search:</label>
    <input type="search">

    <label>Upload File:</label>
    <input type="file">

    <label>Choose Color:</label>
    <input type="color">

    <label>Range:</label>
    <input type="range">

    <div class="gender">
        <p>Gender:</p>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
    </div>

    <div class="skills">
        <p>Skills:</p>
        <input type="checkbox"> HTML
        <input type="checkbox"> CSS
        <input type="checkbox"> Python
    </div>

    <br>

    <button type="submit">Submit</button>
    <button type="reset">Reset</button>

</div>

</body>
</html>
